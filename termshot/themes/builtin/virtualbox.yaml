name: "VirtualBox"
background: "#300A24"
cursor_color: "#FFFFFF"
colors:
  prompt_user: "#4E9A06"
  prompt_host: "#729FCF"
  prompt_path: "#729FCF"
  separator: "#888A85"
  command: "#EEEEEE"
  output: "#D3D7CF"
  error: "#EF2929"
  warning: "#FCE94F"
  success: "#8AE234"
  info: "#729FCF"
  dim: "#888888"
font:
  family: "DejaVu Sans Mono"
  size: 12
  line_height: 18
prompt:
  type: bash
  pattern: '^[a-zA-Z_][\w.-]*@[\w.-]+:[^$#]*[$#]\s*'
  format: "{user}@{host}:{path}$ "
  user: "oriol"
  host: "MV1"
  path: "~"
window:
  chrome: virtualbox
  title: "MV1 [Running] - Oracle VM VirtualBox"
  titlebar_bg: "#F0F0F0"
  titlebar_fg: "#1E1E1E"
  border_color: "#1A1A1A"
  border_width: 4
  vm_menu: true
padding: {top: 8, bottom: 8, left: 14, right: 14}
width_max: 720
